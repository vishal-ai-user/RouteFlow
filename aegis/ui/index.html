<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS Control Center</title>
    <!-- Google Fonts Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <!-- Global App Wrapper -->
    <div id="app-container" class="authenticated-layout">
        
        <!-- Sidebar Navigation -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-brand">
                <span class="brand-logo">▲</span>
                <div class="brand-text">
                    <h1>AEGIS</h1>
                    <span class="tagline">Control Center</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#/dashboard" id="nav-dashboard" class="nav-item">
                    <span class="nav-icon">📊</span> Dashboard
                </a>
                <a href="#/providers" id="nav-providers" class="nav-item">
                    <span class="nav-icon">🔌</span> Providers
                </a>
                <a href="#/mappings" id="nav-mappings" class="nav-item">
                    <span class="nav-icon">🗺️</span> Model Mappings
                </a>
                <a href="#/logs" id="nav-logs" class="nav-item">
                    <span class="nav-icon">📝</span> Request Logs
                </a>
                <a href="#/errors" id="nav-errors" class="nav-item">
                    <span class="nav-icon">⚠️</span> Error Logs
                </a>
                <a href="#/usage" id="nav-usage" class="nav-item">
                    <span class="nav-icon">📈</span> Usage Analytics
                </a>
                <a href="#/settings" id="nav-settings" class="nav-item">
                    <span class="nav-icon">⚙️</span> Settings
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <button id="btn-logout" class="btn-logout">
                    <span class="nav-icon">🚪</span> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <div id="main-content" class="main-content">
            <!-- Top Header Status Bar -->
            <header class="top-header">
                <div class="header-left">
                    <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle Sidebar">☰</button>
                    <h2 id="current-page-title">Dashboard</h2>
                </div>
                <div class="header-right">
                    <div id="server-health-badge" class="health-badge loading">
                        <span class="badge-dot"></span>
                        <span class="badge-text">Checking server status...</span>
                    </div>
                </div>
            </header>

            <!-- Dynamic Viewport -->
            <main id="viewport" class="viewport">
                <!-- Page contents injected here dynamically -->
            </main>
        </div>
    </div>

    <!-- Global Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Global Modal Root -->
    <div id="modal-container" class="modal-overlay hidden">
        <div class="modal-box">
            <header class="modal-header">
                <h3 id="modal-title">Modal Title</h3>
                <button id="modal-close" class="modal-close-btn">&times;</button>
            </header>
            <div id="modal-body" class="modal-body">
                <!-- Dynamic form or content -->
            </div>
        </div>
    </div>

    <!-- Main JS Application script (ES Module) -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
